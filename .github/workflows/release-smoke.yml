name: Release Smoke

on:
  workflow_dispatch:
    inputs:
      skip_e2e:
        description: "Skip E2E tests in smoke pipeline"
        required: false
        default: false
        type: boolean

concurrency:
  group: release-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run release smoke (full)
        if: ${{ !inputs.skip_e2e }}
        run: npm run smoke:release

      - name: Run release smoke (skip e2e)
        if: ${{ inputs.skip_e2e }}
        run: npm run smoke:release -- --skip-e2e
