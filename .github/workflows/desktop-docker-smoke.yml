name: Desktop + Docker Smoke

on:
  pull_request:
    paths:
      - "Dockerfile"
      - "docker-compose.yml"
      - "scripts/local-experience.mjs"
      - "src-tauri/**"
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "pyproject.toml"
      - ".github/workflows/desktop-docker-smoke.yml"
  workflow_dispatch:

concurrency:
  group: desktop-docker-smoke-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect_changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            frontend:
              - 'src/**'
              - 'src-tauri/**'
              - 'package.json'
              - 'package-lock.json'
              - 'vite.config.ts'
              - 'tsconfig*.json'
            docker:
              - 'Dockerfile'
              - 'docker-compose.yml'
              - 'scripts/local-experience.mjs'
              - 'pyproject.toml'
              - '.env.example'

  desktop_web_build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: detect_changes
    if: ${{ needs.detect_changes.outputs.frontend == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate Tauri config JSON
        run: node -e "const fs=require('fs'); JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8')); console.log('tauri-config-ok')"

      - name: Build frontend dist (for Tauri)
        run: npm run build

  docker_backend_smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: detect_changes
    if: ${{ needs.detect_changes.outputs.docker == 'true' }}
    env:
      APP_HOST_PORT: "18001"
      DATABASE_URL: "sqlite+aiosqlite:///./data/desktop_docker_smoke.db"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Compose config check
        run: docker compose config

      - name: Start local docker flow
        run: npm run local:up

      - name: Check backend health through local flow
        run: npm run local:check

      - name: Dump compose logs on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs app qdrant > compose-failure.log

      - name: Upload docker logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: docker-compose-failure-logs
          path: compose-failure.log
          if-no-files-found: ignore

      - name: Tear down
        if: always()
        run: npm run local:down

  no_relevant_changes:
    runs-on: ubuntu-latest
    needs: detect_changes
    if: ${{ needs.detect_changes.outputs.frontend != 'true' && needs.detect_changes.outputs.docker != 'true' }}
    steps:
      - name: Skip message
        run: echo "No desktop/docker related changes detected."
