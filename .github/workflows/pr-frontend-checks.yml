name: PR Checks

on:
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect_changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            backend:
              - 'app/**'
              - 'tests/**'
              - 'pyproject.toml'
            frontend:
              - 'src/**'
              - 'package.json'
              - 'package-lock.json'
              - 'vite.config.ts'
              - 'tsconfig*.json'
            e2e:
              - 'e2e/**'
              - 'playwright.config.ts'

  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: detect_changes

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        if: ${{ needs.detect_changes.outputs.backend == 'true' }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        if: ${{ needs.detect_changes.outputs.backend == 'true' }}
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run backend tests
        if: ${{ needs.detect_changes.outputs.backend == 'true' }}
        run: python -m pytest -q

      - name: Setup Node.js
        if: ${{ needs.detect_changes.outputs.frontend == 'true' || needs.detect_changes.outputs.e2e == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install Node dependencies
        if: ${{ needs.detect_changes.outputs.frontend == 'true' || needs.detect_changes.outputs.e2e == 'true' }}
        run: npm ci

      - name: Run text encoding gate
        if: ${{ needs.detect_changes.outputs.frontend == 'true' }}
        run: npm run check:text-encoding

      - name: Run frontend unit tests
        if: ${{ needs.detect_changes.outputs.frontend == 'true' }}
        run: |
          if npm run | grep -q "test:unit"; then
            npm run test:unit
          else
            echo "skip test:unit (script not found)"
          fi

      - name: Run frontend build
        if: ${{ needs.detect_changes.outputs.frontend == 'true' }}
        run: npm run build

      - name: Install Playwright browser
        if: ${{ needs.detect_changes.outputs.e2e == 'true' }}
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        if: ${{ needs.detect_changes.outputs.e2e == 'true' }}
        env:
          E2E_BACKEND_PORT: "8001"
          E2E_FRONTEND_PORT: "5173"
        run: |
          if npm run | grep -q "test:e2e"; then
            npm run test:e2e
          else
            echo "skip test:e2e (script not found)"
          fi

      - name: Upload Playwright artifacts (on failure)
        if: ${{ failure() && needs.detect_changes.outputs.e2e == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

      - name: Summary (no relevant code changes)
        if: ${{ needs.detect_changes.outputs.backend != 'true' && needs.detect_changes.outputs.frontend != 'true' && needs.detect_changes.outputs.e2e != 'true' }}
        run: echo "No backend/frontend/e2e code changes detected, checks skipped by design."
