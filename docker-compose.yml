version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-live2d-backend
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./data/app.db
      QDRANT_URL: http://qdrant:6333
    volumes:
      - ./data:/app/data
    depends_on:
      - qdrant
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.15.4
    container_name: agent-live2d-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    restart: unless-stopped

