services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-live2d-backend
    ports:
      - "${APP_HOST_PORT:-8001}:8001"
    env_file:
      - .env.example
    environment:
      PORT: 8001
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:///./data/app.db}
      QDRANT_URL: http://qdrant:6333
    volumes:
      - app_data:/app/data
    depends_on:
      - qdrant
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/api/health').read()\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.15.4
    container_name: agent-live2d-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:6333/healthz > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  app_data:
  qdrant_storage:
